<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="300" fill="#f8f8f6"/>

  <!-- LEFT CLUSTER (field A) -->
  <g stroke="#d8d8d0" stroke-width="0.8">
    <line x1="95" y1="120" x2="55"  y2="80"/>
    <line x1="95" y1="120" x2="50"  y2="150"/>
    <line x1="95" y1="120" x2="120" y2="75"/>
    <line x1="95" y1="120" x2="115" y2="170"/>
    <line x1="95" y1="120" x2="60"  y2="115"/>
    <line x1="55" y1="80"  x2="120" y2="75"/>
    <line x1="50" y1="150" x2="115" y2="170"/>
  </g>
  <g fill="#9a9a90">
    <circle cx="95"  cy="120" r="6"/>
    <circle cx="55"  cy="80"  r="4"/>
    <circle cx="50"  cy="150" r="4"/>
    <circle cx="120" cy="75"  r="4"/>
    <circle cx="115" cy="170" r="4"/>
    <circle cx="60"  cy="115" r="3.5"/>
    <circle cx="40"  cy="110" r="2.5"/>
    <circle cx="80"  cy="55"  r="2.5"/>
    <circle cx="135" cy="120" r="2.5"/>
    <circle cx="85"  cy="195" r="2.5"/>
  </g>

  <!-- RIGHT CLUSTER (field C) -->
  <g stroke="#cdd6d2" stroke-width="0.8">
    <line x1="305" y1="180" x2="345" y2="140"/>
    <line x1="305" y1="180" x2="350" y2="215"/>
    <line x1="305" y1="180" x2="280" y2="135"/>
    <line x1="305" y1="180" x2="285" y2="230"/>
    <line x1="305" y1="180" x2="340" y2="185"/>
    <line x1="345" y1="140" x2="280" y2="135"/>
    <line x1="350" y1="215" x2="285" y2="230"/>
  </g>
  <g fill="#7a978c">
    <circle cx="305" cy="180" r="6"/>
    <circle cx="345" cy="140" r="4"/>
    <circle cx="350" cy="215" r="4"/>
    <circle cx="280" cy="135" r="4"/>
    <circle cx="285" cy="230" r="4"/>
    <circle cx="340" cy="185" r="3.5"/>
    <circle cx="360" cy="175" r="2.5"/>
    <circle cx="320" cy="110" r="2.5"/>
    <circle cx="265" cy="180" r="2.5"/>
    <circle cx="315" cy="245" r="2.5"/>
  </g>

  <!-- THE BRIDGE: the single inferred connection -->
  <line x1="95" y1="120" x2="305" y2="180" stroke="#4a7a6a" stroke-width="1.6" stroke-dasharray="6 5"/>
  <circle cx="200" cy="150" r="5" fill="#4a7a6a"/>
  <circle cx="200" cy="150" r="11" fill="none" stroke="#4a7a6a" stroke-width="0.8" opacity="0.4"/>
</svg>
